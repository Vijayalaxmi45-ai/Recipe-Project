<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modals</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
</head>
<body class="container-fluid">
    <h2>Modals</h2> 
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#registerMadal" >Register</button>
    <button class="btn btn-success">Login</button>

    <div class="modal fade" id="registerMadal">
        <div class="modal-dialog bg-body-secondary">
            <div class="modal-content">
                <h2 class="modal-title">Register New User</h2>
                <button class="btn btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <dl>
                    <dt>User Name</dt>
                    <dd><input type="text"></dd>
                    <dt>User password</dt>
                    <dd><input type="password"></dd>
                    <dt>User email</dt>
                    <dd><input type="email"></dd>
                </dl>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary ">Register</button>
                <button class="btn btn-danger" data-bs-dismiss="">Cancle</button>
            </div>
        </div>
    </div>



    <script src="../node_modules/jquery/dist/jquery.js"></script>
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
</body>
</html>
