<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">

    <title>Home</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fffdf7;
        }
        .hero-section {
            height: 80vh;
            text-align: center;
        }
        .hero-title {
            font-size: 3rem;
            font-weight: bold;
        }
        .hero-subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #555;
        }
    </style>
</head>
<body class="container-fluid">

    <!-- Header Section -->
    <header class="d-flex justify-content-between align-items-center p-3 bg-primary text-white m-3 rounded-2">
        <div class="d-flex align-items-center">
            <h2 class="m-0">Let's See</h2>
        </div>
        <nav>
            <ul class="d-flex list-unstyled m-0">
                <li class="m-2"><a class="text-white text-decoration-none" href="#">Home</a></li>
                <li class="m-2"><a class="text-white text-decoration-none" href="#">About</a></li>
                <li class="m-2"><a class="text-white text-decoration-none" href="#">Recipes</a></li>
                <li class="m-2"><a class="text-white text-decoration-none" href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="d-flex flex-column justify-content-center align-items-center hero-section">
        <h1 class="hero-title">Welcome to Let's See Recipes! 🍲</h1>
        <p class="hero-subtitle">Discover mouth-watering dishes, try new cuisines, and find your next favorite recipe!</p>

        <!-- Search Bar -->
        <div class="input-group w-75 w-md-50">
            <select class="input-group-text">
                <option selected disabled> recipe</option>
            </select>
            <input list="recipeSuggestions" type="text" class="form-control" placeholder="Search recipes...">
            <datalist id="recipeSuggestions">
                <option value="Pasta">
                <option value="Dhokala">
                <option value="Pizza">
                <option value="Roti">
                <option value="Puran Poli">
                <option value="Sambhar">
                <option value="Varan Bhat">
                <option value="Vda pav">
                <option value="Paneer Tikka">
                <option value="Idali">
                <option value="Pav Bhaji">
                <option value="Avail">
                <option value="Dosa"></option>
            </datalist>
            <button class="btn btn-warning">
                <span class="bi bi-search-heart"></span>
            </button>
        </div>

        <!-- CTA Button -->
        <div class="mt-4">
            <a href="#" class="btn btn-primary btn-lg">Start Exploring</a>
        </div>
    </section>

    <!-- JS Scripts -->
    <script src="../node_modules/jquery/dist/jquery.js"></script>
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
</body>
</html>
