<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join SpiceRoute Community</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap and Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fff5f5 0%, #f0fff4 100%);
        }
        .auth-card {
            background: white;
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 20px;
            border: 2px solid #eee;
        }
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="auth-container p-3">
        <div class="auth-card text-center animate-up">
            <a href="index.html" class="brand fs-2 text-decoration-none mb-4 d-block">Spice<span>Route</span></a>
            <h2 class="mb-2">Create Account</h2>
            <p class="text-secondary mb-5">Join thousands of food enthusiasts sharing authentic recipes.</p>
            
            <form action="index.html" onsubmit="alert('Registration Successful! Welcome to SpiceRoute.'); return true;">
                <div class="mb-4 text-start">
                    <label class="form-label fw-500">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-2"><i class="bi bi-person text-secondary"></i></span>
                        <input type="text" class="form-control border-start-0 border-2" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-500">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-2"><i class="bi bi-envelope text-secondary"></i></span>
                        <input type="email" class="form-control border-start-0 border-2" placeholder="john@example.com" required>
                    </div>
                </div>
                <div class="mb-5 text-start">
                    <label class="form-label fw-500">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-2"><i class="bi bi-lock text-secondary"></i></span>
                        <input type="password" class="form-control border-start-0 border-2" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-4 fs-5">Sign Up Now</button>
                
                <p class="mb-0 text-secondary">Already have an account? <a href="#" class="text-primary-color fw-bold text-decoration-none">Log In</a></p>
            </form>
            
            <div class="mt-5 pt-4 border-top">
                <p class="small text-secondary mb-3">Or sign up with</p>
                <div class="d-flex justify-content-center gap-3">
                    <button class="btn btn-outline-dark rounded-circle px-3"><i class="bi bi-google"></i></button>
                    <button class="btn btn-outline-dark rounded-circle px-3"><i class="bi bi-facebook"></i></button>
                    <button class="btn btn-outline-dark rounded-circle px-3"><i class="bi bi-apple"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="js/app.js"></script>
</body>
</html>
